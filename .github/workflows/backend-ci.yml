name: backend-ci

on:
  push:
    paths:
      - 'api/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: urbansportstore_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd api && npm install
      - run: cd api && npm run db:generate
      - run: cd api && DATABASE_URL=postgresql://postgres:postgres@localhost:5432/urbansportstore_test npm run db:deploy
      - run: cd api && npm run lint
      - run: cd api && npm test
      - run: cd api && npm run build
